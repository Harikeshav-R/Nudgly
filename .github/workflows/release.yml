name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: macos-26
            rid: osx-x64
          - os: macos-26
            rid: osx-arm64

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install workloads
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          dotnet workload restore Nudgly.macOS/Nudgly.macOS.csproj
        elif [ "$RUNNER_OS" == "Windows" ]; then
          dotnet workload restore Nudgly.Windows/Nudgly.Windows.csproj
        fi
      shell: bash

    - name: Restore dependencies
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          dotnet restore Nudgly.macOS/Nudgly.macOS.csproj
        elif [ "$RUNNER_OS" == "Windows" ]; then
          dotnet restore Nudgly.Windows/Nudgly.Windows.csproj
        fi
      shell: bash

    - name: Publish
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          PROJECT="Nudgly.macOS/Nudgly.macOS.csproj"
        elif [ "$RUNNER_OS" == "Windows" ]; then
          PROJECT="Nudgly.Windows/Nudgly.Windows.csproj"
        fi

        # Publish to a temporary directory
        dotnet publish $PROJECT --configuration Release --runtime ${{ matrix.rid }} -p:PublishAot=true -p:StripSymbols=true -o ./publish

        if [ "$RUNNER_OS" == "macOS" ]; then
          # Create DMG from the .app bundle (the macOS SDK places it in the bin folder regardless of the -o flag)
          hdiutil create -volname "Nudgly" -srcfolder Nudgly.macOS/bin/Release/net10.0-macos/${{ matrix.rid }}/Nudgly.app -ov -format UDZO Nudgly-${{ matrix.rid }}.dmg
        else
          # On Windows, rename the binary to include the RID
          mv ./publish/Nudgly.exe ./Nudgly-${{ matrix.rid }}.exe
        fi
      shell: bash

    - name: Upload Release Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          ASSET="Nudgly-${{ matrix.rid }}.dmg"
        else
          ASSET="Nudgly-${{ matrix.rid }}.exe"
        fi
        gh release upload ${{ github.event.release.tag_name }} ./$ASSET --clobber
      shell: bash
